<svg xmlns="http://www.w3.org/2000/svg" width="420mm" height="297mm" viewBox="0 0 420 297">
  <!-- Автор: Марьяновский Владислав Андреевич -->
  <rect width="420" height="297" fill="white"/>
  <text x="210" y="24" font-family="Arial, sans-serif" font-size="10" text-anchor="middle" fill="black">AR Marker 6 x 4</text>
  <g transform="translate(30 48)">
    <rect x="0" y="0" width="360" height="200" fill="white" stroke="black" stroke-width="2"/>
    <rect x="0" y="0" width="60" height="50" fill="black"/>
    <rect x="120" y="0" width="60" height="50" fill="black"/>
    <rect x="240" y="0" width="60" height="50" fill="black"/>
    <rect x="60" y="50" width="60" height="50" fill="black"/>
    <rect x="180" y="50" width="60" height="50" fill="black"/>
    <rect x="300" y="50" width="60" height="50" fill="black"/>
    <rect x="0" y="100" width="60" height="50" fill="black"/>
    <rect x="120" y="100" width="60" height="50" fill="black"/>
    <rect x="240" y="100" width="60" height="50" fill="black"/>
    <rect x="60" y="150" width="60" height="50" fill="black"/>
    <rect x="180" y="150" width="60" height="50" fill="black"/>
