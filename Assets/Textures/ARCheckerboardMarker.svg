  </g>
  <text x="210" y="276" font-family="Arial, sans-serif" font-size="8" text-anchor="middle" fill="black">Можно собрать вручную из двух А4: 6 столбцов, 4 ряда, чередовать черные и белые клетки.</text>
</svg>
